configuration:
  scan_paths:
    name: Scan-Pfade
    description: Liste der zu scannenden Verzeichnisse (z.B. /share, /media). Entspricht den HA-Freigaben.
  scan_schedule:
    name: Scan-Zeitplan
    description: Wie oft ein automatischer Scan durchgeführt wird. 'disabled' deaktiviert automatische Scans.
  scan_hour:
    name: Scan-Uhrzeit
    description: Stunde (0–23), zu der der geplante Scan startet (für täglich/wöchentlich).
  daemon_mode:
    name: Daemon-Modus (RAM vs. Geschwindigkeit)
    description: >-
      'always' = ClamAV-Daemon läuft dauerhaft und hält die ~1 GB Signatur-DB
      permanent im RAM. Scans starten sofort. Empfohlen bei genug RAM
      (>= 2 GB frei) oder häufigen Scans.
      'on_demand' = Kein Daemon. Jeder Scan lädt die DB frisch von Platte und
      gibt den RAM danach wieder frei. Idle-RAM ~50 MB statt ~1 GB, dafür
      jeder Scan-Start 30-60 Sekunden länger (je nach Disk-Speed; SD-Karte
      langsam, SSD schnell). Empfohlen für RAM-knappe Hardware (z.B.
      Raspberry Pi) wenn du nur 1× täglich scannst.
  scan_archives:
    name: Archive scannen
    description: >-
      Wenn aktiv, entpackt ClamAV den Inhalt von Archiven (ZIP, TAR, RAR,
      7z, PDF, Office, HTML) und scannt diese. Genauer aber sehr langsam
      auf Media-Libraries. Wenn deaktiviert, werden nur die äußeren Dateien
      gescannt — 5-20× schneller bei Media/Archiven, für private Mediathek
      meist OK. Empfehlung - AUS für /media, AN für /share mit Dokumenten.
  skip_images:
    name: Bilddateien überspringen
    description: >-
      Wenn aktiv, werden gängige Bildformate (jpg, jpeg, png, gif, webp,
      heic, tiff, bmp, raw, cr2, nef, arw, dng, svg) übersprungen.
      Bilddateien enthalten praktisch nie von ClamAV erkennbaren Schadcode.
      Spart viel Zeit bei großen Fotosammlungen. Groß-/Kleinschreibung
      egal (.JPG und .jpg passen beide).
  skip_videos:
    name: Videodateien überspringen
    description: >-
      Wenn aktiv, werden gängige Videoformate (mp4, mkv, mov, avi, m4v,
      webm, wmv, flv, 3gp, mts, m2ts, mpeg, mpg) übersprungen. Videos sind
      groß und enthalten praktisch nie Schadcode — größter Speed-Boost
      auf Mediatheken. Groß-/Kleinschreibung egal.
  skip_audio:
    name: Audiodateien überspringen
    description: >-
      Wenn aktiv, werden gängige Audioformate (mp3, flac, wav, m4a, ogg,
      aac, opus, wma, aiff) übersprungen. Audiodateien enthalten praktisch
      nie Schadcode. Groß-/Kleinschreibung egal.
  exclude_patterns:
    name: Eigene Ausschluss-Muster (Regex)
    description: >-
      Zusätzliche Regex-Muster auf vollen Dateipfaden. Dateien und
      Verzeichnisse die passen werden übersprungen — zusätzlich zu den
      Toggles "Bilder/Videos/Audio überspringen" oben. Beispiele - "\.mkv$"
      überspringt alle .mkv-Dateien; "/cache/" überspringt jedes Cache-
      Verzeichnis. Im HA-UI-Formular: einfacher Backslash (\.mkv$); seit
      v1.0.9 werden beide Schreibweisen (\.mkv$ und \\.mkv$) akzeptiert.
  incremental_scan:
    name: Inkrementeller Scan
    description: >-
      Wenn aktiv, werden nur Dateien gescannt, die seit dem letzten Scan
      geändert wurden. Der erste Scan ist immer ein Vollscan. Folge-Scans
      überspringen unveränderte Dateien komplett. Riesiger Speed-Boost bei
      täglichen Scans auf stabilen Mediatheken (typisch 100× schneller
      nach dem ersten Lauf). Nachteil - eine bereits infizierte aber
      unveränderte Datei wird nicht erneut gescannt, auch wenn neue Viren-
      Signaturen sie jetzt erkennen würden. Daher regelmäßig (z.B. monatlich)
      einen Vollscan durchführen (diese Option zeitweise AUS).
  auto_quarantine:
    name: Infizierte Dateien automatisch quarantänisieren
    description: Infizierte Dateien werden automatisch in /data/quarantine verschoben.
  max_file_size_mb:
    name: Maximale Dateigröße (MB)
    description: Dateien größer als dieser Wert werden beim Scan übersprungen.
  notify_ha:
    name: Home Assistant benachrichtigen
    description: Sendet eine persistente HA-Benachrichtigung wenn ein Scan abgeschlossen ist oder eine Bedrohung gefunden wurde.
  log_level:
    name: Log-Level
    description: Detailgrad der Addon-Protokollierung.
  web_port:
    name: Web-GUI-Port
    description: Port für die Weboberfläche (Standard 8200).
  admin_password_enabled:
    name: Passwortschutz aktivieren
    description: Schützt die Weboberfläche mit Benutzername und Passwort.
  admin_username:
    name: Admin-Benutzername
    description: Benutzername für die Weboberfläche (Standard admin).
  admin_password:
    name: Admin-Passwort
    description: Passwort für die Weboberfläche. Nur aktiv wenn admin_password_enabled aktiviert ist.
